
    <style>
    .pretty-card{
      font-family: ui-sans-serif, system-ui;

      overflow-x: auto;
      font-size: 13px;
      white-space: pre-wrap;

      border-collapse: collapse;
      width: 100%;

      color: #111;

    .pretty-card table.pretty-table td {
      border: 1px solid #e5e7eb;
      padding: 6px 8px;
      text-align: left;
